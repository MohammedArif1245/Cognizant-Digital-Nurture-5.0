<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Learning Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1 class="site-title">Student Portal</h1>

        <div class="menu">☰</div>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main -->
    <main>

        <!-- Hero -->
        <section id="hero">
            <h1>Welcome to the Student Portal</h1>

            <p>
                Access your courses, track your academic progress,
                and explore new learning opportunities.
            </p>

            <button>Explore Courses</button>
        </section>

        <!-- Stats -->
        <div class="stats">
            <div>Courses Enrolled: 3</div>
            <div>GPA: 3.8</div>
            <div>Semester: 6</div>
        </div>

        <!-- Courses -->
        <section id="courses">

            <h2>Available Courses</h2>

            <input
                type="text"
                id="search-courses"
                placeholder="Search courses..."
            >

            <button id="sort-btn">
                Sort by Credits
            </button>

            <div id="selected-course"></div>

            <div class="course-grid"></div>

            <p id="total-credits"></p>

        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>2026 Student Portal. All Rights Reserved.</p>
    </footer>

    <script type="module" src="app.js"></script>

</body>
</html>
